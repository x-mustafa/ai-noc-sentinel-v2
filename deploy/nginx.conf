# NOC Sentinel v2 — Production Nginx Configuration
# Place at: /etc/nginx/sites-available/noc-sentinel
# Enable: ln -s /etc/nginx/sites-available/noc-sentinel /etc/nginx/sites-enabled/
#
# Requirements:
#   - SSL certificate placed at /etc/ssl/noc-sentinel/{cert.pem,key.pem}
#   - FastAPI running on 127.0.0.1:8000
#   - WhatsApp bridge on 127.0.0.1:3001

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name noc.example.com;                    # ← change to your domain

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;                      # Let's Encrypt webroot
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name noc.example.com;                    # ← change to your domain

    # ── SSL ──────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/ssl/noc-sentinel/cert.pem;
    ssl_certificate_key /etc/ssl/noc-sentinel/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout    5s;

    # ── Security Headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           DENY                                            always;
    add_header X-Content-Type-Options    nosniff                                         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;
    add_header Permissions-Policy        "geolocation=(), camera=(), microphone=()"      always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self'; object-src 'none'; frame-ancestors 'none';" always;

    # ── Limits ───────────────────────────────────────────────────────────────
    client_max_body_size 50M;             # allow file uploads up to 50 MB
    keepalive_timeout    65;

    # ── Rate limiting ─────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=login_zone:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api_zone:10m   rate=60r/m;

    location /api/auth/login {
        limit_req zone=login_zone burst=3 nodelay;
        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/noc-proxy-params.conf;
    }

    # ── SSE endpoints (streaming — must disable buffering) ───────────────────
    location ~ ^/api/(chat|office/run|office/collaborate) {
        proxy_pass          http://127.0.0.1:8000;
        proxy_http_version  1.1;
        proxy_set_header    Connection '';
        proxy_buffering     off;
        proxy_cache         off;
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        include /etc/nginx/noc-proxy-params.conf;
    }

    # ── Static files (served directly by nginx for performance) ──────────────
    location /static/ {
        alias /opt/noc-sentinel/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── All other API routes ──────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_zone burst=30 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_read_timeout 60s;
        include /etc/nginx/noc-proxy-params.conf;
    }

    # ── SPA fallback ─────────────────────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/noc-proxy-params.conf;
    }

    # ── Access log ───────────────────────────────────────────────────────────
    access_log /var/log/nginx/noc-sentinel-access.log combined;
    error_log  /var/log/nginx/noc-sentinel-error.log  warn;
}
